[package]
name = "kiba-installer"
version = "0.1.0"
description = "Kiba MCP installer"
authors = ["Kiba"]
edition = "2021"
rust-version = "1.70"

[lib]
name = "kiba_installer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"
which = "6"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
