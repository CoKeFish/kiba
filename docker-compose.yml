services:
  contracts:
    build:
      context: .
      dockerfile: packages/contracts/Dockerfile
    container_name: ab-contracts
    volumes:
      - ./packages/contracts:/workspace
      - solana-keys:/root/.config/solana
      - cargo-cache:/root/.cargo/registry
      - anchor-cache:/root/.avm
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
    stdin_open: true
    tty: true
    command: tail -f /dev/null  # Mantiene el container vivo para `docker compose exec`

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: ab-backend
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/test:/app/packages/backend/test
      - ./packages/sdk/src:/app/packages/sdk/src
      - backend-data:/app/packages/backend/data
      - backend-models:/app/packages/backend/models
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - PORT=${BACKEND_PORT:-4000}
      - PROGRAM_ID=${PROGRAM_ID:-}
      - SEMANTIC_SEARCH=${SEMANTIC_SEARCH:-true}
    depends_on:
      - contracts

  landing:
    build:
      context: .
      dockerfile: packages/landing/Dockerfile
    container_name: ab-landing
    volumes:
      - ./packages/landing/src:/app/src
      - ./packages/landing/public:/app/public
      - ./packages/landing/astro.config.mjs:/app/astro.config.mjs
    ports:
      - "3010:4321"
    environment:
      - NODE_ENV=development
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:4000}
      - PUBLIC_GATEWAY_URL=${PUBLIC_GATEWAY_URL:-http://localhost:8000}
      - PUBLIC_DASHBOARD_URL=${PUBLIC_DASHBOARD_URL:-http://localhost:3020}
    depends_on:
      - backend

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: ab-dashboard
    volumes:
      - ./packages/dashboard/src:/app/src
      - ./packages/dashboard/index.html:/app/index.html
      - ./packages/dashboard/vite.config.ts:/app/vite.config.ts
    ports:
      - "3020:5173"
    environment:
      - NODE_ENV=development
      - VITE_GATEWAY_URL=http://gateway:8000
      - VITE_BACKEND_URL=http://backend:4000
    depends_on:
      - gateway
      - backend

  demo-agents:
    build:
      context: .
      dockerfile: packages/demo-agents/Dockerfile
    container_name: ab-agents
    volumes:
      - ./packages/demo-agents/src:/app/packages/demo-agents/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - agents-data:/app/data
    ports:
      - "5001:5001"  # yield-hunter
      - "5002:5002"  # risk-auditor
    environment:
      - NODE_ENV=development
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - PROGRAM_ID=${PROGRAM_ID:-}
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    container_name: ab-gateway
    volumes:
      - ./packages/gateway/src:/app/packages/gateway/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - gateway-data:/app/data
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - PROGRAM_ID=${PROGRAM_ID:-}
      - BACKEND_URL=http://backend:4000
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:8000}
      - SOL_USD_RATE=${SOL_USD_RATE:-150}
    depends_on:
      - backend
      - demo-agents

  orchestrator-agent:
    build:
      context: .
      dockerfile: packages/orchestrator-agent/Dockerfile
    container_name: ab-orchestrator
    volumes:
      - ./packages/orchestrator-agent/src:/app/packages/orchestrator-agent/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - orchestrator-data:/app/data
    ports:
      - "6001:6001"
    environment:
      - NODE_ENV=development
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - PROGRAM_ID=${PROGRAM_ID:-}
      - BACKEND_URL=http://backend:4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=6001
    depends_on:
      - backend
      - demo-agents

volumes:
  solana-keys:
  cargo-cache:
  anchor-cache:
  agents-data:
  orchestrator-data:
  gateway-data:
  backend-data:
  backend-models:
