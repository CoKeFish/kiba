services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: kiba-backend
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/test:/app/packages/backend/test
      - ./packages/sdk/src:/app/packages/sdk/src
      - backend-data:/app/packages/backend/data
      - backend-models:/app/packages/backend/models
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=${BACKEND_PORT:-4000}
      - SEMANTIC_SEARCH=${SEMANTIC_SEARCH:-true}
      # Cadena: con CHAIN=stellar el backend indexa el registro Soroban.
      - CHAIN=${CHAIN:-stellar}
      - STELLAR_CONTRACT_ID=${STELLAR_CONTRACT_ID:-CDYLMRS2UTBHNTWS67NC2OPQIH2HXGS36WZYC4JUMLKZWT7XXVUUX7XF}
      - STELLAR_RPC_URL=${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      - "STELLAR_NETWORK_PASSPHRASE=${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      - STELLAR_FRIENDBOT_URL=${STELLAR_FRIENDBOT_URL:-https://friendbot.stellar.org}
      - STELLAR_HORIZON_URL=${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      - STELLAR_SERVICES=${STELLAR_SERVICES:-yield-hunter,risk-auditor,translator-pro,price-oracle,code-reviewer,firecrawl}

  landing:
    build:
      context: .
      dockerfile: packages/landing/Dockerfile
      # Astro hornea PUBLIC_* en build time, así que tienen que ser build args
      # (no env runtime). Default a localhost para uso local con docker compose.
      args:
        PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4000}
        PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8000}
        PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-http://localhost:3020}
    container_name: kiba-landing
    volumes:
      - ./packages/landing/src:/app/src
      - ./packages/landing/public:/app/public
      - ./packages/landing/astro.config.mjs:/app/astro.config.mjs
    ports:
      - "3010:4321"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: kiba-dashboard
    volumes:
      - ./packages/dashboard/src:/app/src
      - ./packages/dashboard/index.html:/app/index.html
      - ./packages/dashboard/vite.config.ts:/app/vite.config.ts
    ports:
      - "3020:5173"
    environment:
      - NODE_ENV=development
      - VITE_GATEWAY_URL=http://gateway:8000
      - VITE_BACKEND_URL=http://backend:4000
      # Cadena para la UI (etiquetas, explorer, tasa). Se deriva de CHAIN.
      - VITE_CHAIN=${CHAIN:-stellar}
      - VITE_XLM_USD_RATE=${XLM_USD_RATE:-0.12}
    depends_on:
      - gateway
      - backend

  demo-agents:
    build:
      context: .
      dockerfile: packages/demo-agents/Dockerfile
    container_name: kiba-agents
    volumes:
      - ./packages/demo-agents/src:/app/packages/demo-agents/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - agents-data:/app/data
    ports:
      - "5001:5001"  # yield-hunter
      - "5002:5002"  # risk-auditor
      - "5003:5003"  # translator-pro
      - "5004:5004"  # price-oracle
      - "5005:5005"  # code-reviewer
      - "5006:5006"  # firecrawl
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:4000
      # Cadena: con CHAIN=stellar los agentes registran y cobran en Soroban.
      - CHAIN=${CHAIN:-stellar}
      - STELLAR_CONTRACT_ID=${STELLAR_CONTRACT_ID:-CDYLMRS2UTBHNTWS67NC2OPQIH2HXGS36WZYC4JUMLKZWT7XXVUUX7XF}
      - STELLAR_RPC_URL=${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      - "STELLAR_NETWORK_PASSPHRASE=${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      - STELLAR_FRIENDBOT_URL=${STELLAR_FRIENDBOT_URL:-https://friendbot.stellar.org}
      # Firecrawl (agente real de web scraping). Key gratis en firecrawl.dev.
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    depends_on:
      - backend

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    container_name: kiba-gateway
    volumes:
      - ./packages/gateway/src:/app/packages/gateway/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - gateway-data:/app/data
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:4000
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:8000}
      # Cadena: con CHAIN=stellar las custodiales y el proxy x402 operan en Soroban.
      - CHAIN=${CHAIN:-stellar}
      - STELLAR_CONTRACT_ID=${STELLAR_CONTRACT_ID:-CDYLMRS2UTBHNTWS67NC2OPQIH2HXGS36WZYC4JUMLKZWT7XXVUUX7XF}
      - STELLAR_RPC_URL=${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      - "STELLAR_NETWORK_PASSPHRASE=${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      - STELLAR_FRIENDBOT_URL=${STELLAR_FRIENDBOT_URL:-https://friendbot.stellar.org}
      - STELLAR_HORIZON_URL=${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      - XLM_USD_RATE=${XLM_USD_RATE:-0.12}
    depends_on:
      - backend
      - demo-agents

  orchestrator-agent:
    build:
      context: .
      dockerfile: packages/orchestrator-agent/Dockerfile
    container_name: kiba-orchestrator
    volumes:
      - ./packages/orchestrator-agent/src:/app/packages/orchestrator-agent/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - orchestrator-data:/app/data
    ports:
      - "6001:6001"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=6001
      # Cadena: con CHAIN=stellar el orquestador liquida pagos a specialists en Soroban.
      - CHAIN=${CHAIN:-stellar}
      - STELLAR_CONTRACT_ID=${STELLAR_CONTRACT_ID:-CDYLMRS2UTBHNTWS67NC2OPQIH2HXGS36WZYC4JUMLKZWT7XXVUUX7XF}
      - STELLAR_RPC_URL=${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      - "STELLAR_NETWORK_PASSPHRASE=${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      - STELLAR_FRIENDBOT_URL=${STELLAR_FRIENDBOT_URL:-https://friendbot.stellar.org}
    depends_on:
      - backend
      - demo-agents

volumes:
  agents-data:
  orchestrator-data:
  gateway-data:
  backend-data:
  backend-models:
