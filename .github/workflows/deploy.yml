name: deploy

# CI/CD de Kiba.
#   Frontends (Astro landing, Vite dashboard) -> Vercel
#   Backends  (backend indexer, gateway x402) -> Railway
# Cada push a main: corre tests + escaneo de secretos, y despliega SOLO los
# paquetes que cambiaron. En pull_request corre tests + gitleaks (sin desplegar).
#
# Secrets requeridos en el repo (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN    Token de Vercel  (https://vercel.com/account/tokens)
#   RAILWAY_TOKEN   Project token del proyecto "kiba" en Railway
# Los IDs de Vercel (org/project) NO son secretos y van inline abajo.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_9ih8tHa4Rdt6QMgOLYFGnBAx

jobs:
  # ---- ¿Qué cambió? --------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.f.outputs.landing }}
      dashboard: ${{ steps.f.outputs.dashboard }}
      backend: ${{ steps.f.outputs.backend }}
      gateway: ${{ steps.f.outputs.gateway }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            landing:
              - 'packages/landing/**'
            dashboard:
              - 'packages/dashboard/**'
            backend:
              - 'packages/backend/**'
              - 'packages/sdk/**'
              - 'package-lock.json'
            gateway:
              - 'packages/gateway/**'
              - 'packages/sdk/**'
              - 'package-lock.json'

  # ---- Escaneo de secretos (gate de los deploys) ---------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # historia completa para escanear todos los commits
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Gratis para cuentas personales. Si el repo pasa a una organización,
          # añadir el secret GITLEAKS_LICENSE (https://gitleaks.io/products.html).

  # ---- Tests (gate de los deploys) -----------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run workspace tests
        run: npm test --workspaces --if-present

  # ---- Vercel: landing -----------------------------------------------------
  deploy-landing:
    needs: [changes, gitleaks, test]
    if: needs.changes.outputs.landing == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/landing
    env:
      VERCEL_PROJECT_ID: prj_gLOztq0RbVqTKyIaf5skUBkIDtW3
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ---- Vercel: dashboard ---------------------------------------------------
  deploy-dashboard:
    needs: [changes, gitleaks, test]
    if: needs.changes.outputs.dashboard == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dashboard
    env:
      VERCEL_PROJECT_ID: prj_rAW3qHsRmUw9UavD37nRaMZxG2qC
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ---- Railway: backend ----------------------------------------------------
  deploy-backend:
    needs: [changes, gitleaks, test]
    if: needs.changes.outputs.backend == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g @railway/cli
      - name: Deploy backend
        run: railway up --service backend --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ---- Railway: gateway ----------------------------------------------------
  deploy-gateway:
    needs: [changes, gitleaks, test]
    if: needs.changes.outputs.gateway == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g @railway/cli
      - name: Deploy gateway
        run: railway up --service gateway --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
