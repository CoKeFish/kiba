name: publish-kiba-sdk

# Publica packages/sdk (kiba-sdk) en npm al pushear un tag `sdk-v*`.
# Espejo de publish-mcp.yml. Usa un Automation token de npm (secret NPM_TOKEN)
# que NO requiere OTP/2FA, evitando el publish manual.
#
# Para liberar una versión:
#   1) sube "version" en packages/sdk/package.json
#   2) commit + push a main
#   3) git tag sdk-v<version> && git push origin sdk-v<version>
#
# Requisito único: secret NPM_TOKEN en GitHub (Settings → Secrets and variables →
#   Actions), Automation token de npmjs.com con permiso de publish. El paquete es
#   SIN scope (kiba-sdk, igual que kiba-mcp), así que NO hace falta crear ningún org.
#   El build a dist lo hace el prepack del package; se publica con --access public.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # habilita npm provenance (repo público)
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
